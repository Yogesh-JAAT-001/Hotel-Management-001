<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Deluxe Room</title>
  <desc id="desc">Luxury visual placeholder</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1b2d"/>
      <stop offset="100%" stop-color="#213757"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
