  <rect width="1920" height="1080" fill="url(#bg)"/>
  <ellipse cx="960" cy="500" rx="760" ry="300" fill="url(#light)"/>
  <rect x="220" y="210" width="1480" height="660" rx="32" fill="rgba(255,255,255,0.08)" stroke="rgba(212,175,55,0.45)" stroke-width="4"/>
  <text x="960" y="500" text-anchor="middle" fill="#f6e3a6" font-size="78" font-family="Cinzel, Georgia, serif">Deluxe Room</text>
  <text x="960" y="575" text-anchor="middle" fill="#e9dcc4" font-size="36" font-family="Inter, Arial, sans-serif">Luxury visual placeholder</text>
